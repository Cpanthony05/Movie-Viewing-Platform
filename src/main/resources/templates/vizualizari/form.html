<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formular Vizualizare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${vizualizare.idVizualizare == null} ? 'Adaugă Vizualizare' : 'Editare Vizualizare'"></h2>
    <hr>

    <form th:action="${vizualizare.idVizualizare == null} ? @{/vizualizari/nou} : @{/vizualizari/{id}/editare(id=${vizualizare.idVizualizare})}" 
          th:object="${vizualizare}" method="post" class="row g-3">
        
        <div class="col-md-6">
            <label class="form-label">Client</label>
            <select th:field="*{idClient}" class="form-select" required>
                <option value="" disabled selected>Alege un client...</option>
                <option th:each="c : ${clienti}" th:value="${c.idClient}" th:text="${c.nume + ' ' + c.prenume}"></option>
            </select>
        </div>
        
        <div class="col-md-6">
            <label class="form-label">Versiune Film</label>
            <select th:field="*{idVersiune}" class="form-select" required>
                <option value="" disabled selected>Alege versiunea...</option>
                <option th:each="ver : ${versiuni}" th:value="${ver.idVersiune}" th:text="${ver.titluFilm}"></option>
            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label">Data Vizualizare</label>
            <input type="date" th:field="*{dataVizualizare}" class="form-control" required>
        </div>

        <div class="col-md-4">
            <label class="form-label">Durată (minute)</label>
            <input type="number" th:field="*{durataMin}" class="form-control" min="1">
        </div>

        <div class="col-md-4">
            <label class="form-label">Stare</label>
            <select th:field="*{stare}" class="form-select">
                <option value="Inceput">Inceput</option>
                <option value="In curs">In curs</option>
                <option value="Finalizat">Finalizat</option>
            </select>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvează</button>
            <a th:href="@{/vizualizari}" class="btn btn-secondary">Anulează</a>
        </div>
    </form>
</body>
</html>

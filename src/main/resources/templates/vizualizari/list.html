<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Vizualizări</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Vizualizări</h2>
        <a th:href="@{/vizualizari/nou}" class="btn btn-success">Adaugă Vizualizare Nouă</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Film (Versiune)</th>
                <th>Data</th>
                <th>Durată (min)</th>
                <th>Stare</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${vizualizari}">
                <td th:text="${v.idVizualizare}"></td>
                <td th:text="${v.numeClient}"></td>
                <td th:text="${v.titluFilm}"></td>
                <td th:text="${v.dataVizualizare}"></td>
                <td th:text="${v.durataMin}"></td>
                <td>
                    <span class="badge bg-secondary" th:text="${v.stare}"></span>
                </td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/vizualizari/{id}/editare(id=${v.idVizualizare})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/vizualizari/{id}/stergere(id=${v.idVizualizare})}" method="post" 
                              onsubmit="return confirm('Sigur vrei să ștergi această înregistrare?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Distribuție</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Distribuție Filme</h2>
        <a th:href="@{/distributie/nou}" class="btn btn-success">Adaugă Distribuție Nouă</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Film</th>
                <th>Actor</th>
                <th>Rol</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="d : ${distributii}">
                <td th:text="${d.titluFilm}"></td>
                <td th:text="${d.numeActor}"></td>
                <td th:text="${d.rol}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/distributie/{idF}/{idA}/editare(idF=${d.idFilm}, idA=${d.idActor})}" 
                           class="btn btn-sm btn-warning">Edit</a>
                        
                        <form th:action="@{/distributie/{idF}/{idA}/stergere(idF=${d.idFilm}, idA=${d.idActor})}" 
                              method="post" 
                              onsubmit="return confirm('Sigur vrei să ștergi această distribuție?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>

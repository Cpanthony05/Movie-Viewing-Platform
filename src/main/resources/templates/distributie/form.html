<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formular Distribuție</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${editMode} ? 'Editare Rol' : 'Adaugă Distribuție'"></h2>
    <hr>

    <form th:action="${editMode} ? @{/distributie/{idF}/{idA}/editare(idF=${distributie.idFilm}, idA=${distributie.idActor})} : @{/distributie/nou}" 
          th:object="${distributie}" method="post" class="row g-3">
        
        <div class="col-md-6">
            <label class="form-label">Film</label>
            <select th:field="*{idFilm}" class="form-select" th:disabled="${editMode}" required>
                <option value="" th:text="'-- Selectează Film --'"></option>
                <option th:each="f : ${filme}" th:value="${f.idFilm}" th:text="${f.titlu}"></option>
            </select>
            <input type="hidden" th:if="${editMode}" th:field="*{idFilm}" />
        </div>
        
        <div class="col-md-6">
            <label class="form-label">Actor</label>
            <select th:field="*{idActor}" class="form-select" th:disabled="${editMode}" required>
                <option value="" th:text="'-- Selectează Actor --'"></option>
                <option th:each="a : ${actori}" th:value="${a.idActor}" 
                        th:text="${a.prenume + ' ' + a.numeFamilie}"></option>
            </select>
            <input type="hidden" th:if="${editMode}" th:field="*{idActor}" />
        </div>

        <div class="col-md-12">
            <label class="form-label">Rolul Actorului</label>
            <input type="text" name="rol" th:value="*{rol}" class="form-control" placeholder="Ex: Personaj Principal" required>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvează</button>
            <a th:href="@{/distributie}" class="btn btn-secondary">Anulează</a>
        </div>
    </form>
</body>
</html>

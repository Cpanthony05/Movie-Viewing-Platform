<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Comentarii</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Comentarii</h2>
        <a th:href="@{/comentarii/nou}" class="btn btn-success">Adaugă Comentariu Nou</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Film</th>
                <th>Actor</th>
                <th>Text Comentariu</th>
                <th>Data</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${comentarii}">
                <td th:text="${c.idComentariu}"></td>
                <td th:text="${c.numeClient}"></td>
                <td th:text="${c.titluFilm}"></td>
                <td th:text="${c.numeActor}"></td>
                <td th:text="${c.textComentariu}"></td>
                <td th:text="${c.dataComentariu}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/comentarii/{id}/editare(id=${c.idComentariu})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/comentarii/{id}/stergere(id=${c.idComentariu})}" method="post" 
                              onsubmit="return confirm('Sigur vrei să ștergi acest comentariu?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>

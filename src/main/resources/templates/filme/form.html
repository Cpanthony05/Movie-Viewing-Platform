<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formular Film</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${film.idFilm == null} ? 'Adaugă Film' : 'Editare Film'"></h2>
    <hr>

    <form th:action="${film.idFilm == null} ? @{/filme/nou} : @{/filme/{id}/editare(id=${film.idFilm})}" 
          th:object="${film}" method="post" class="row g-3">
        
        <div class="col-md-8">
            <label class="form-label">Titlu</label>
            <input type="text" th:field="*{titlu}" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Categorie</label>
            <input type="text" th:field="*{categorie}" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Data Lansare</label>
            <input type="date" th:field="*{dataLansare}" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Rating</label>
            <input type="number" step="0.1" th:field="*{rating}" class="form-control" min="0" max="10">
        </div>
        <div class="col-12">
            <label class="form-label">Descriere</label>
            <textarea th:field="*{descriere}" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvează</button>
            <a th:href="@{/filme}" class="btn btn-secondary">Anulează</a>
        </div>
    </form>
</body>
</html>

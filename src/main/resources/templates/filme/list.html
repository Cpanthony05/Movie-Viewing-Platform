<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Filme</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Filme</h2>
        <a th:href="@{/filme/nou}" class="btn btn-success">Adaugă Film Nou</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Titlu</th>
                <th>Categorie</th>
                <th>Data Lansare</th>
                <th>Rating</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="f : ${filme}">
                <td th:text="${f.titlu}"></td>
                <td th:text="${f.categorie}"></td>
                <td th:text="${f.dataLansare}"></td>
                <td th:text="${f.rating}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/filme/{id}/editare(id=${f.idFilm})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/filme/{id}/stergere(id=${f.idFilm})}" method="post" 
                              onsubmit="return confirm('Sigur doriți să ștergeți acest film?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>

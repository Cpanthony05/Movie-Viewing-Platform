<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formular Client</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${client.idClient == null} ? 'Adaugă Client' : 'Editare Client'"></h2>
    <hr>

    <form th:action="${client.idClient == null} ? @{/clienti/nou} : @{/clienti/{id}/editare(id=${client.idClient})}" 
          th:object="${client}" method="post" class="row g-3">
        
        <div class="col-md-6">
            <label class="form-label">Nume</label>
            <input type="text" th:field="*{nume}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Prenume</label>
            <input type="text" th:field="*{prenume}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Telefon Mobil</label>
            <input type="text" th:field="*{telefonMobil}" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Telefon Acasă</label>
            <input type="text" th:field="*{telefonAcasa}" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Oraș</label>
            <input type="text" th:field="*{oras}" class="form-control">
        </div>
        <div class="col-12">
            <label class="form-label">Adresă</label>
            <textarea th:field="*{adresa}" class="form-control" rows="2"></textarea>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvează</button>
            <a th:href="@{/clienti}" class="btn btn-secondary">Anulează</a>
        </div>
    </form>
</body>
</html>

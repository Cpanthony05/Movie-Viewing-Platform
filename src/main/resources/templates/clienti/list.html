<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Clienți</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Clienți</h2>
        <a th:href="@{/clienti/nou}" class="btn btn-success">Adaugă Client Nou</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Nume</th>
                <th>Prenume</th>
                <th>Email</th>
                <th>Telefon Mobil</th>
                <th>Oraș</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${clienti}">
                <td th:text="${c.nume}"></td>
                <td th:text="${c.prenume}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.telefonMobil}"></td>
                <td th:text="${c.oras}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/clienti/{id}/editare(id=${c.idClient})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/clienti/{id}/stergere(id=${c.idClient})}" method="post" 
                              onsubmit="return confirm('Sigur doriți să ștergeți acest client?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>

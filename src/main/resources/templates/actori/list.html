<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Actori</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Actori</h2>
        <a th:href="@{/actori/nou}" class="btn btn-success">Adaugă Actor Nou</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nume Scenă</th>
                <th>Prenume</th>
                <th>Nume Familie</th>
                <th>Data Nașterii</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${actori}">
                <td th:text="${a.idActor}"></td>
                <td th:text="${a.numeScena}"></td>
                <td th:text="${a.prenume}"></td>
                <td th:text="${a.numeFamilie}"></td>
                <td th:text="${a.dataNasterii}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/actori/{id}/editare(id=${a.idActor})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/actori/{id}/stergere(id=${a.idActor})}" method="post" 
                              onsubmit="return confirm('Sigur vrei să ștergi?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>

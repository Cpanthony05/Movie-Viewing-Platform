<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formular Actor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${actor.idActor == null} ? 'Adaugă Actor' : 'Editare Actor'"></h2>
    <hr>

    <form th:action="${actor.idActor == null} ? @{/actori/nou} : @{/actori/{id}/editare(id=${actor.idActor})}" 
          th:object="${actor}" method="post" class="row g-3">
        
        <div class="col-md-6">
            <label class="form-label">Nume Scenă</label>
            <input type="text" th:field="*{numeScena}" class="form-control">
        </div>
        
        <div class="col-md-6">
            <label class="form-label">Prenume</label>
            <input type="text" th:field="*{prenume}" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Nume Familie</label>
            <input type="text" th:field="*{numeFamilie}" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Data Nașterii</label>
            <input type="date" th:field="*{dataNasterii}" class="form-control">
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvează</button>
            <a th:href="@{/actori}" class="btn btn-secondary">Anulează</a>
        </div>
    </form>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formular Vot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${vot.idVot == null} ? 'Adaugă Vot' : 'Editare Vot'"></h2>
    <hr>

    <form th:action="${vot.idVot == null} ? @{/voturi/nou} : @{/voturi/{id}/editare(id=${vot.idVot})}" 
          th:object="${vot}" method="post" class="row g-3">
        
        <div class="col-md-6">
            <label class="form-label">Client</label>
            <select th:field="*{idClient}" class="form-select" required>
                <option value="" th:text="'-- Selectează Client --'"></option>
                <option th:each="c : ${clienti}" th:value="${c.idClient}" th:text="${c.nume}"></option>
            </select>
        </div>
        
        <div class="col-md-6">
            <label class="form-label">Film</label>
            <select th:field="*{idFilm}" class="form-select" required>
                <option value="" th:text="'-- Selectează Film --'"></option>
                <option th:each="f : ${filme}" th:value="${f.idFilm}" th:text="${f.titlu}"></option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">Punctaj</label>
            <input type="number" th:field="*{punctaj}" class="form-control" min="1" max="10" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Data Vot</label>
            <input type="date" th:field="*{dataVot}" class="form-control" required>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvează</button>
            <a th:href="@{/voturi}" class="btn btn-secondary">Anulează</a>
        </div>
    </form>
</body>
</html>

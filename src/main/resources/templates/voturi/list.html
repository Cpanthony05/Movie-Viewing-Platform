<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Voturi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Voturi</h2>
        <a th:href="@{/voturi/nou}" class="btn btn-success">Adaugă Vot Nou</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Film</th>
                <th>Punctaj</th>
                <th>Data Vot</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${voturi}">
                <td th:text="${v.idVot}"></td>
                <td th:text="${v.numeClient}"></td>
                <td th:text="${v.titluFilm}"></td>
                <td th:text="${v.punctaj}"></td>
                <td th:text="${v.dataVot}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/voturi/{id}/editare(id=${v.idVot})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/voturi/{id}/stergere(id=${v.idVot})}" method="post" 
                              onsubmit="return confirm('Sigur vrei să ștergi acest vot?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>

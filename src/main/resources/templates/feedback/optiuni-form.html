<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formular Opțiune Feedback</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 th:text="${optiune.idOptiune == null} ? 'Adaugă Opțiune Feedback' : 'Editare Opțiune Feedback'"></h2>
    <hr>

    <form th:action="${optiune.idOptiune == null} ? @{/optiuni-feedback/nou} : @{/optiuni-feedback/{id}/editare(id=${optiune.idOptiune})}" 
          th:object="${optiune}" method="post" class="row g-3">
        
        <input type="hidden" th:field="*{idOptiune}" />

        <div class="col-md-12">
            <label class="form-label">Descriere Opțiune</label>
            <textarea th:field="*{descriere}" 
                      class="form-control" 
                      placeholder="Ex: Foarte Bun, Slab, etc." 
                      rows="3" 
                      required></textarea>
            <div class="form-text">Introduceți textul care va apărea ca variantă de feedback.</div>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvează</button>
            <a th:href="@{/optiuni-feedback}" class="btn btn-secondary">Anulează</a>
        </div>
    </form>
</body>
</html>

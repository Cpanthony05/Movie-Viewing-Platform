<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Opțiuni Feedback</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Opțiuni Feedback</h2>
        <a th:href="@{/optiuni-feedback/nou}" class="btn btn-success">Adaugă Opțiune Nouă</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descriere</th>
                <th style="width: 200px;">Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="o : ${optiuni}">
                <td th:text="${o.idOptiune}"></td>
                <td th:text="${o.descriere}"></td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/optiuni-feedback/{id}/editare(id=${o.idOptiune})}" 
                           class="btn btn-sm btn-warning">Edit</a>
                        
                        <form th:action="@{/optiuni-feedback/{id}/stergere(id=${o.idOptiune})}" 
                              method="post" 
                              onsubmit="return confirm('Sigur doriți să ștergeți această opțiune?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}" class="btn btn-secondary">Înapoi la Home</a>
</body>
</html>
